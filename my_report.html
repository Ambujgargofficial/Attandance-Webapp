<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-radius: 50%; border-top: 4px solid #3498db; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #report-table { border-collapse: collapse; width: 100%; font-size: 12px; }
        #report-table th, #report-table td { border: 1px solid #ddd; padding: 4px; text-align: center; vertical-align: top; }
        #report-table th { background-color: #f2f2f2; position: sticky; top: 0; z-index: 10; }
        .status-P { background-color: #c8e6c9; }
        .status-L { background-color: #fff9c4; }
        .status-A { background-color: #ffcdd2; }
        .status-PA { background-color: #b3e5fc; }
        .status-text { font-weight: bold; font-size: 1.1em; }
        .time-text { font-size: 0.75rem; color: #555; margin-top: 4px; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-7xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">My Attendance Report</h1>

        <!-- Filters Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4 items-end">
            <div>
                <label for="startDate" class="block text-sm font-medium text-gray-700">Start Date</label>
                <input type="date" id="startDate" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label for="endDate" class="block text-sm font-medium text-gray-700">End Date</label>
                <input type="date" id="endDate" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <button id="fetchReportBtn" class="bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 font-semibold h-10 flex items-center justify-center">
                <span id="btn-text">Fetch My Report</span>
                <div id="btn-loader" class="loader hidden"></div>
            </button>
        </div>
        
        <!-- Duty Timings Display -->
        <div id="duty-timings" class="mb-4 p-4 bg-gray-50 rounded-md text-sm leading-relaxed border border-gray-200"></div>

        <!-- Report Display Section -->
        <div id="report-container" class="overflow-x-auto">
            <p class="text-center text-gray-500">Please select date range and click "Fetch My Report".</p>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "<?= ScriptApp.getService().getUrl() ?>";
        const EMPLOYEE_ID = "<?= employeeId ?>"; // Get employee ID from template
        const fetchReportBtn = document.getElementById('fetchReportBtn');
        const reportContainer = document.getElementById('report-container');
        const dutyTimingsDiv = document.getElementById('duty-timings');

        // Set default dates to today
        const today = new Date();
        document.getElementById('startDate').valueAsDate = today;
        document.getElementById('endDate').valueAsDate = today;

        fetchReportBtn.addEventListener('click', fetchMyReport);
        
        document.addEventListener('DOMContentLoaded', (event) => {
            fetchMyReport();
        });

        async function fetchMyReport() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                alert('Please fill all the fields.');
                return;
            }

            toggleLoader(true);
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getReport&startDate=${startDate}&endDate=${endDate}&empId=${EMPLOYEE_ID}`);
                if (!response.ok) throw new Error('Network response was not ok.');
                
                const reportData = await response.json();
                if (reportData.status === 'error') throw new Error(reportData.message);

                renderReport(reportData.data);

            } catch (error) {
                console.error('Error fetching report:', error);
                reportContainer.innerHTML = `<p class="text-center text-red-500">Error: ${error.message}</p>`;
            } finally {
                toggleLoader(false);
            }
        }

        function renderReport(data) {
            if (!data.employees || data.employees.length === 0) {
                reportContainer.innerHTML = `<p class="text-center text-gray-500">No data found for the selected period.</p>`;
                dutyTimingsDiv.innerHTML = '';
                return;
            }
            
            const employee = data.employees[0];

            // Added Location and Department to display
            dutyTimingsDiv.innerHTML = `
                <p><strong>Name:</strong> ${employee.name} | <strong>Location:</strong> ${employee.location} | <strong>Dept:</strong> ${employee.department}</p>
                <p><strong>Duty On:</strong> ${employee.startTime} (Grace: ${employee.allowanceIn} min) | <strong>Duty Off:</strong> ${employee.endTime} (Grace: ${employee.allowanceOut} min)</p>
            `;

            let tableHTML = '<table id="report-table" class="mt-4 shadow-sm"><thead><tr>';
            data.dateHeaders.forEach(day => {
                tableHTML += `<th>${day}</th>`;
            });
            tableHTML += '</tr></thead><tbody><tr>';

            employee.statuses.forEach(dayData => {
                const statusClass = dayData.status === 'P/A' ? 'status-PA' : `status-${dayData.status}`;
                tableHTML += `<td class="${statusClass}">`;
                tableHTML += `<div class="status-text">${dayData.status}</div>`;
                if (dayData.inTime) {
                    tableHTML += `<div class="time-text">In: ${dayData.inTime}<br>Out: ${dayData.outTime || '--:--'}</div>`;
                }
                tableHTML += `</td>`;
            });
            tableHTML += '</tr></tbody></table>';
            reportContainer.innerHTML = tableHTML;
        }
        
        function toggleLoader(show) {
            document.getElementById('btn-text').style.display = show ? 'none' : 'block';
            document.getElementById('btn-loader').style.display = show ? 'block' : 'none';
            fetchReportBtn.disabled = show;
        }

    </script>
</body>
</html>
